<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Vibes"/>
<title>Vibes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #f5f5f7;
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  .top {
    background: #fff;
    padding: 52px 22px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #ebebeb;
    position: sticky; top: 0; z-index: 20;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: #f2f2f5; color: #1c1c1e;
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:active { background: #ddd; }
  .month-title { font-size: 20px; font-weight: 600; color: #1c1c1e; letter-spacing: -0.3px; }

  .today-banner { background: #fff; padding: 10px 22px 14px; border-bottom: 1px solid #ebebeb; }
  .today-pill {
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: 20px; padding: 7px 16px;
    font-size: 13px; font-weight: 500;
  }
  .today-dot { width: 9px; height: 9px; border-radius: 50%; }

  .cal-wrap {
    background: #fff; margin: 14px 14px 0;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .weekdays {
    display: grid; grid-template-columns: repeat(7,1fr);
    padding: 12px 8px 6px;
  }
  .wd {
    text-align: center; font-size: 11px; font-weight: 600;
    color: #aaa; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .grid {
    display: grid; grid-template-columns: repeat(7,1fr);
    gap: 5px; padding: 4px 8px 14px;
  }
  .cell {
    aspect-ratio: 1; border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.12s;
    min-height: 38px; position: relative;
  }
  .cell:active { transform: scale(0.85); }
  .cell.empty { pointer-events: none; background: transparent !important; }

  .ph-ovulation   { background: #16a34a; }
  .ph-follicular2 { background: #4ade80; }
  .ph-follicular1 { background: #bbf7d0; }
  .ph-luteal      { background: #fde047; }
  .ph-pms1        { background: #fca5a5; }
  .ph-pms2        { background: #f87171; }
  .ph-period      { background: #ef4444; }
  .ph-none        { background: #f0f0f3; }

  .cell-num { font-size: 15px; font-weight: 500; line-height: 1; }
  .ph-ovulation .cell-num, .ph-pms2 .cell-num, .ph-period .cell-num { color: #fff; }
  .ph-follicular1 .cell-num, .ph-luteal .cell-num, .ph-pms1 .cell-num { color: #333; }
  .ph-follicular2 .cell-num { color: #166534; }
  .ph-none .cell-num { color: #999; }

  .is-today { box-shadow: inset 0 0 0 2.5px rgba(0,0,0,0.3); }
  .ph-none.is-today { box-shadow: inset 0 0 0 2.5px #007aff; }
  .is-today .cell-num { font-weight: 700; }

  .selected { box-shadow: 0 0 0 3px rgba(0,0,0,0.2), 0 6px 20px rgba(0,0,0,0.18); transform: scale(1.1); z-index: 2; }

  .detail {
    margin: 12px 14px 0; border-radius: 18px; overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
  }
  .detail-inner {
    padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  }
  .detail-icon {
    font-size: 26px; width: 48px; height: 48px; border-radius: 14px;
    background: rgba(255,255,255,0.28);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .detail-phase { font-size: 16px; font-weight: 700; }
  .detail-date  { font-size: 12px; margin-top: 2px; opacity: 0.72; }
  .detail-tip   { font-size: 13px; margin-top: 5px; opacity: 0.88; line-height: 1.5; }

  .legend-wrap {
    margin: 14px 14px 36px;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .legend-toggle {
    background: #fff; border: none; width: 100%;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .legend-toggle:active { background: #f5f5f7; }
  .legend-toggle-left { display: flex; align-items: center; gap: 10px; }
  .legend-toggle-label { font-size: 13px; font-weight: 600; color: #1c1c1e; }
  .legend-swatches-preview { display: flex; gap: 4px; }
  .preview-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-arrow {
    font-size: 12px; color: #aaa;
    transition: transform 0.25s ease;
    display: inline-block;
  }
  .legend-arrow.open { transform: rotate(180deg); }

  .legend-body {
    background: #fff;
    border-top: 1px solid #ebebeb;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 14px 16px;
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.25s ease;
    opacity: 0; padding-top: 0; padding-bottom: 0;
  }
  .legend-body.open {
    max-height: 300px; opacity: 1;
    padding: 14px 16px;
  }
  .leg-item { display: flex; align-items: center; gap: 10px; }
  .leg-swatch { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; }
  .leg-name { font-size: 12px; font-weight: 500; color: #555; }
</style>
</head>
<body>

<div class="top">
  <button class="nav-btn" onclick="shift(-1)">‹</button>
  <div class="month-title" id="monthTitle"></div>
  <button class="nav-btn" onclick="shift(1)">›</button>
</div>

<div class="today-banner">
  <div class="today-pill" id="todayPill">
    <div class="today-dot" id="todayDot"></div>
    <span id="todayText"></span>
  </div>
</div>

<div class="cal-wrap">
  <div class="weekdays">
    <div class="wd">S</div><div class="wd">M</div><div class="wd">T</div>
    <div class="wd">W</div><div class="wd">T</div><div class="wd">F</div>
    <div class="wd">S</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="detail" id="detail" style="display:none"></div>

<div class="legend-wrap">
  <button class="legend-toggle" onclick="toggleLegend()">
    <div class="legend-toggle-left">
      <div class="legend-swatches-preview">
        <div class="preview-dot" style="background:#16a34a"></div>
        <div class="preview-dot" style="background:#fde047"></div>
        <div class="preview-dot" style="background:#f87171"></div>
        <div class="preview-dot" style="background:#ef4444"></div>
      </div>
      <div class="legend-toggle-label">Color Guide</div>
    </div>
    <span class="legend-arrow" id="legendArrow">▼</span>
  </button>
  <div class="legend-body" id="legendBody">
    <div class="leg-item"><div class="leg-swatch" style="background:#16a34a"></div><div class="leg-name">🔥 Green Zone</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#4ade80"></div><div class="leg-name">🟢 Rising</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#bbf7d0"></div><div class="leg-name">🌱 Lifting</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#fde047"></div><div class="leg-name">🟡 Luteal</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#fca5a5"></div><div class="leg-name">🔸 PMS</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#f87171"></div><div class="leg-name">🔴 PMS Peak</div></div>
    <div class="leg-item"><div class="leg-swatch" style="background:#ef4444"></div><div class="leg-name">❤️ Period</div></div>
  </div>
</div>

<script>
const PH = {
  ovulation:   { cls:'ph-ovulation',   icon:'🔥', label:'Green Zone',  tip:'Go time. She\'s into it.',        bg:'linear-gradient(135deg,#16a34a,#15803d)', tc:'#fff' },
  follicular2: { cls:'ph-follicular2', icon:'🟢', label:'Rising',       tip:'Affectionate. Plan something.',   bg:'linear-gradient(135deg,#22c55e,#16a34a)', tc:'#fff' },
  follicular1: { cls:'ph-follicular1', icon:'🌱', label:'Lifting',      tip:'Warming back up slowly.',         bg:'linear-gradient(135deg,#86efac,#4ade80)', tc:'#166534' },
  luteal:      { cls:'ph-luteal',      icon:'🟡', label:'Luteal',       tip:'Give space. Don\'t be needy.',    bg:'linear-gradient(135deg,#fef08a,#fde047)', tc:'#713f12' },
  pms1:        { cls:'ph-pms1',        icon:'🔸', label:'PMS',          tip:'Tread carefully. Stay patient.',  bg:'linear-gradient(135deg,#fca5a5,#f87171)', tc:'#7f1d1d' },
  pms2:        { cls:'ph-pms2',        icon:'🔴', label:'PMS Peak',     tip:'Say less. Maximum space.',        bg:'linear-gradient(135deg,#f87171,#ef4444)', tc:'#fff' },
  period:      { cls:'ph-period',      icon:'❤️', label:'Period',       tip:'Comfort mode. Zero pressure.',    bg:'linear-gradient(135deg,#ef4444,#dc2626)', tc:'#fff' },
};

// Build cycle map
const C = {};
function mark(y,m,d1,d2,ph){
  for(let d=d1;d<=d2;d++){
    let yy=y,mm=m,dd=d;
    while(dd>new Date(yy,mm,0).getDate()){dd-=new Date(yy,mm,0).getDate();mm++;if(mm>12){mm=1;yy++;}}
    C[`${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`]=ph;
  }
}

// CYCLE 1 — Feb 28 ovulation anchor
mark(2025,3,2,10,'luteal');
mark(2025,3,11,13,'pms1');
mark(2025,3,14,15,'pms2');
mark(2025,3,16,20,'period');
mark(2025,3,21,24,'follicular1');
mark(2025,3,25,29,'follicular2');
mark(2025,3,30,33,'ovulation'); // overflows into Apr 1-3

// CYCLE 2
mark(2025,4,4,11,'luteal');
mark(2025,4,12,13,'pms1');
mark(2025,4,14,16,'pms2');
mark(2025,4,17,21,'period');
mark(2025,4,22,25,'follicular1');
mark(2025,4,26,35,'follicular2'); // Apr 26-30 + overflow
// fix: Apr 26-30 follicular2, May 1-5 ovulation
mark(2025,4,26,30,'follicular2');
mark(2025,5,1,5,'ovulation');

// CYCLE 3
mark(2025,5,6,13,'luteal');
mark(2025,5,14,15,'pms1');
mark(2025,5,16,18,'pms2');
mark(2025,5,19,23,'period');
mark(2025,5,24,27,'follicular1');
mark(2025,5,28,31,'follicular2');
mark(2025,6,1,4,'ovulation');

// CYCLE 4
mark(2025,6,5,12,'luteal');
mark(2025,6,13,14,'pms1');
mark(2025,6,15,17,'pms2');
mark(2025,6,18,22,'period');
mark(2025,6,23,26,'follicular1');
mark(2025,6,27,30,'follicular2');
mark(2025,7,1,5,'ovulation');

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today  = new Date();
let yr = 2025, mo = 2; // start March 2025
let selKey = null;

function dkey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey(){ return dkey(today.getFullYear(),today.getMonth(),today.getDate()); }

function renderBanner(){
  const tk=todayKey(), ph=C[tk], p=ph?PH[ph]:null;
  const pill=document.getElementById('todayPill');
  const dot=document.getElementById('todayDot');
  const txt=document.getElementById('todayText');
  const ds=today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  if(p){
    pill.style.background=p.bg; dot.style.background='rgba(255,255,255,0.5)';
    txt.style.color=p.tc; txt.textContent=`${p.icon}  ${ds} — ${p.label}`;
  } else {
    pill.style.background='#f2f2f5'; dot.style.background='#ccc';
    txt.style.color='#555'; txt.textContent=`Today · ${ds}`;
  }
}

function render(){
  document.getElementById('monthTitle').textContent=`${MONTHS[mo]} ${yr}`;
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const firstDow=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const tk=todayKey();
  for(let i=0;i<firstDow;i++){const e=document.createElement('div');e.className='cell empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const k=dkey(yr,mo,d), ph=C[k], p=ph?PH[ph]:null;
    const cell=document.createElement('div');
    cell.className='cell '+(p?p.cls:'ph-none');
    if(k===tk) cell.classList.add('is-today');
    if(k===selKey) cell.classList.add('selected');
    const num=document.createElement('div');
    num.className='cell-num'; num.textContent=d;
    cell.appendChild(num);
    cell.addEventListener('click',()=>{
      selKey=(selKey===k)?null:k;
      showDetail(k,ph,p);
      render();
    });
    grid.appendChild(cell);
  }
}

function showDetail(k,ph,p){
  const card=document.getElementById('detail');
  if(!ph||!p||selKey!==k){card.style.display='none';return;}
  const dt=new Date(k+'T12:00:00');
  const ds=dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  card.style.display='block';
  card.style.background=p.bg;
  card.innerHTML=`<div class="detail-inner">
    <div class="detail-icon">${p.icon}</div>
    <div>
      <div class="detail-phase" style="color:${p.tc}">${p.label}</div>
      <div class="detail-date"  style="color:${p.tc}">${ds}</div>
      <div class="detail-tip"   style="color:${p.tc}">${p.tip}</div>
    </div>
  </div>`;
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function shift(dir){
  mo+=dir;
  if(mo>11){mo=0;yr++;}
  if(mo<0){mo=11;yr--;}
  selKey=null;
  document.getElementById('detail').style.display='none';
  render();
}

function toggleLegend(){
  const body=document.getElementById('legendBody');
  const arrow=document.getElementById('legendArrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

renderBanner();
render();
</script>
</body>
</html>
